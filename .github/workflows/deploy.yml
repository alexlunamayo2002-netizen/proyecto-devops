name: Deploy to Render

on:
  push:
    branches:
      - main  # Esto hace que se active cada vez que subas algo a la rama main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Aquí es donde compilas tu Java/Maven antes de mandar a Render
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Si quieres saltarte los tests temporalmente, puedes borrar la línea de abajo
      - name: Build with Maven
        run: |
          cd app && ./mvnw clean package -DskipTests

  deploy:
    needs: build-and-test  # Solo se despliega si la compilación anterior tiene éxito
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"
